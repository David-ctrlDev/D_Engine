[alembic]
script_location = alembic

# Sequential 4-digit revision ids (e.g. 0001_initial_auth_schema.py).
# Migrations are created with `alembic revision --rev-id 0002 -m "..."`.
file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url is supplied at runtime by alembic/env.py from app settings.
sqlalchemy.url = driver://user:pass@host/dbname

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
